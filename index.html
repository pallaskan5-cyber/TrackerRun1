<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c); color: white; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo img { width: 40px; height: 40px; }
        .profile { position: relative; }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid white; }
        .dropdown { position: absolute; top: 60px; right: 0; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 15px; width: 250px; z-index: 100; display: none; }
        .dropdown.show { display: block; }
        .dropdown-item { padding: 10px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; transition: background 0.3s; }
        .dropdown-item:hover { background: rgba(255,255,255,0.1); }
        .stats { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin: 30px 0; }
        .stat-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; text-align: center; flex: 1; min-width: 200px; backdrop-filter: blur(10px); }
        .stat-card h3 { font-size: 18px; margin-bottom: 10px; }
        .stat-card p { font-size: 24px; font-weight: bold; }
        .controls { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .btn { padding: 15px 30px; border: none; border-radius: 50px; background: rgba(255,255,255,0.2); color: white; font-size: 16px; cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px); }
        .btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .session-history { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin: 30px 0; backdrop-filter: blur(10px); }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-header h2 { font-size: 24px; }
        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-between; align-items: center; }
        .history-item:last-child { border-bottom: none; }
        .history-info { flex: 1; }
        .history-info h3 { font-size: 18px; margin-bottom: 5px; }
        .history-info p { font-size: 14px; opacity: 0.8; }
        .history-actions { display: flex; gap: 10px; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 15px 30px; border-radius: 50px; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }
        .status { text-align: center; margin: 20px 0; padding: 15px; border-radius: 10px; }
        .status.active { background: rgba(46, 204, 113, 0.2); }
        .status.inactive { background: rgba(231, 76, 60, 0.2); }
        .map-container { height: 300px; background: rgba(0,0,0,0.3); border-radius: 15px; margin: 20px 0; display: flex; align-items: center; justify-content: center; }
        .map-container p { text-align: center; opacity: 0.7; }
        .session-info { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; margin: 20px 0; backdrop-filter: blur(10px); }
        .session-info h3 { margin-bottom: 15px; }
        .session-info p { margin: 5px 0; }
        .export-btn { background: rgba(52, 152, 219, 0.3); }
        .export-btn:hover { background: rgba(52, 152, 219, 0.5); }
        .import-btn { background: rgba(155, 89, 182, 0.3); }
        .import-btn:hover { background: rgba(155, 89, 182, 0.5); }
        .clear-btn { background: rgba(231, 76, 60, 0.3); }
        .clear-btn:hover { background: rgba(231, 76, 60, 0.5); }
        .offline { background: rgba(241, 196, 15, 0.3); }
        .offline:hover { background: rgba(241, 196, 15, 0.5); }
        .online { background: rgba(46, 204, 113, 0.3); }
        .online:hover { background: rgba(46, 204, 113, 0.5); }
        .pwa-install { display: none; }
        .pwa-install.show { display: block; }
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; }
            .stats { flex-direction: column; }
            .controls { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span>📍</span>
                <span>GPS Tracker</span>
            </div>
            <div class="profile">
                <img id="avatar" class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ffffff'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="Avatar">
                <div id="dropdown" class="dropdown">
                    <div class="dropdown-item" id="login-btn">Login</div>
                    <div class="dropdown-item" id="logout-btn">Logout</div>
                    <div class="dropdown-item" id="export-btn">Export Data</div>
                    <div class="dropdown-item" id="import-btn">Import Data</div>
                    <div class="dropdown-item" id="clear-btn">Clear History</div>
                </div>
            </div>
        </header>

        <div id="status" class="status inactive">
            <p>Tracking is inactive. Click Start to begin tracking.</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total Distance</h3>
                <p id="total-distance">0.00 km</p>
            </div>
            <div class="stat-card">
                <h3>Session Time</h3>
                <p id="session-time">00:00:00</p>
            </div>
            <div class="stat-card">
                <h3>Points Recorded</h3>
                <p id="points-recorded">0</p>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn" class="btn">Start Tracking</button>
            <button id="stop-btn" class="btn" disabled>Stop Tracking</button>
            <button id="pause-btn" class="btn" disabled>Pause</button>
            <button id="resume-btn" class="btn" disabled>Resume</button>
            <button id="clear-session-btn" class="btn">Clear Session</button>
        </div>

        <div class="map-container">
            <p>Map will appear here</p>
        </div>

        <div class="session-info">
            <h3>Current Session</h3>
            <p><strong>Start Time:</strong> <span id="session-start">-</span></p>
            <p><strong>Current Location:</strong> <span id="current-location">-</span></p>
            <p><strong>Speed:</strong> <span id="current-speed">0 km/h</span></p>
        </div>

        <div class="session-history">
            <div class="history-header">
                <h2>Session History</h2>
                <button id="refresh-history" class="btn">Refresh</button>
            </div>
            <div id="history-list" class="history-list">
                <!-- History items will be added here -->
            </div>
        </div>

        <div class="toast" id="toast"></div>
    </div>

    <script>
        // Global variables
        let tracking = false;
        let paused = false;
        let startTime = null;
        let lastUpdateTime = null;
        let totalDistance = 0;
        let sessionPoints = [];
        let watchId = null;
        let sessionStartTime = null;
        let sessionTimer = null;
        let currentSession = null;
        let history = [];

        // DOM Elements
        const avatar = document.getElementById('avatar');
        const dropdown = document.getElementById('dropdown');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const exportBtn = document.getElementById('export-btn');
        const importBtn = document.getElementById('import-btn');
        const clearBtn = document.getElementById('clear-btn');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resumeBtn = document.getElementById('resume-btn');
        const clearSessionBtn = document.getElementById('clear-session-btn');
        const refreshHistoryBtn = document.getElementById('refresh-history');
        const statusEl = document.getElementById('status');
        const totalDistanceEl = document.getElementById('total-distance');
        const sessionTimeEl = document.getElementById('session-time');
        const pointsRecordedEl = document.getElementById('points-recorded');
        const sessionStartEl = document.getElementById('session-start');
        const currentLocationEl = document.getElementById('current-location');
        const currentSpeedEl = document.getElementById('current-speed');
        const historyListEl = document.getElementById('history-list');
        const toastEl = document.getElementById('toast');

        // Initialize the app
        function init() {
            // Load saved data
            loadHistory();
            updateStats();
            updateHistoryList();
            
            // Set up event listeners
            avatar.addEventListener('click', toggleDropdown);
            loginBtn.addEventListener('click', login);
            logoutBtn.addEventListener('click', logout);
            exportBtn.addEventListener('click', exportData);
            importBtn.addEventListener('click', importData);
            clearBtn.addEventListener('click', clearHistory);
            startBtn.addEventListener('click', startTracking);
            stopBtn.addEventListener('click', stopTracking);
            pauseBtn.addEventListener('click', pauseTracking);
            resumeBtn.addEventListener('click', resumeTracking);
            clearSessionBtn.addEventListener('click', clearSession);
            refreshHistoryBtn.addEventListener('click', updateHistoryList);
            
            // Check if we're online
            updateOnlineStatus();
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            
            // Service Worker registration for PWA
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').catch(error => {
                        console.log('Service Worker registration failed:', error);
                    });
                });
            }
        }

        // Toggle dropdown menu
        function toggleDropdown() {
            dropdown.classList.toggle('show');
        }

        // Login function
        function login() {
            showToast('Login functionality would be implemented here');
            dropdown.classList.remove('show');
        }

        // Logout function
        function logout() {
            showToast('Logout functionality would be implemented here');
            dropdown.classList.remove('show');
        }

        // Export data
        function exportData() {
            const dataStr = JSON.stringify({
                history: history,
                totalDistance: totalDistance,
                timestamp: new Date().toISOString()
            });
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            
            const exportFileDefaultName = 'gps-tracker-data.json';
            
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            
            showToast('Data exported successfully');
        }

        // Import data
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                
                reader.onload = event => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.history) {
                            history = importedData.history;
                            totalDistance = importedData.totalDistance || 0;
                            saveHistory();
                            updateStats();
                            updateHistoryList();
                            showToast('Data imported successfully');
                        }
                    } catch (error) {
                        showToast('Error importing data');
                    }
                };
                
                reader.readAsText(file);
            };
            
            input.click();
        }

        // Clear history
        function clearHistory() {
            if (confirm('Are you sure you want to clear all history?')) {
                history = [];
                totalDistance = 0;
                saveHistory();
                updateStats();
                updateHistoryList();
                showToast('History cleared');
            }
        }

        // Start tracking
        function startTracking() {
            if (tracking) return;
            
            tracking = true;
            paused = false;
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            pauseBtn.disabled = false;
            resumeBtn.disabled = true;
            clearSessionBtn.disabled = false;
            
            sessionStartTime = new Date();
            startTime = sessionStartTime;
            lastUpdateTime = sessionStartTime;
            
            sessionStartEl.textContent = sessionStartTime.toLocaleString();
            
            // Update status
            statusEl.className = 'status active';
            statusEl.innerHTML = '<p>Tracking is active. Recording location data...</p>';
            
            // Start geolocation watch
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    position => {
                        if (tracking && !paused) {
                            const point = {
                                timestamp: new Date(),
                                latitude: position.coords.latitude,
                                longitude: position.coords.longitude,
                                accuracy: position.coords.accuracy,
                                altitude: position.coords.altitude,
                                altitudeAccuracy: position.coords.altitudeAccuracy,
                                speed: position.coords.speed,
                                heading: position.coords.heading
                            };
                            
                            sessionPoints.push(point);
                            updateStats();
                            
                            // Update current location display
                            currentLocationEl.textContent = 
                                `${point.latitude.toFixed(4)}, ${point.longitude.toFixed(4)}`;
                            currentSpeedEl.textContent = 
                                point.speed ? `${(point.speed * 3.6).toFixed(1)} km/h` : '0 km/h';
                            
                            // Update session time
                            updateSessionTime();
                        }
                    },
                    error => {
                        console.error('Geolocation error:', error);
                        showToast('Geolocation error: ' + error.message);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 1000
                    }
                );
            } else {
                showToast('Geolocation not supported');
            }
            
            // Start session timer
            sessionTimer = setInterval(updateSessionTime, 1000);
        }

        // Stop tracking
        function stopTracking() {
            if (!tracking) return;
            
            tracking = false;
            paused = false;
            
            startBtn.disabled = false;
            stopBtn.disabled = true;
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
            
            // Clear geolocation watch
            if (watchId) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }
            
            // Stop session timer
            if (sessionTimer) {
                clearInterval(sessionTimer);
                sessionTimer = null;
            }
            
            // Save session to history
            if (sessionPoints.length > 0) {
                const session = {
                    id: Date.now(),
                    startTime: sessionStartTime,
                    endTime: new Date(),
                    points: sessionPoints,
                    distance: calculateDistance(sessionPoints),
                    duration: calculateDuration(sessionStartTime, new Date())
                };
                
                history.push(session);
                totalDistance = calculateTotalDistance();
                saveHistory();
                updateHistoryList();
            }
            
            sessionPoints = [];
            updateStats();
            
            // Update status
            statusEl.className = 'status inactive';
            statusEl.innerHTML = '<p>Tracking stopped. Session saved to history.</p>';
            
            showToast('Tracking stopped');
        }

        // Pause tracking
        function pauseTracking() {
            if (!tracking || paused) return;
            
            paused = true;
            pauseBtn.disabled = true;
            resumeBtn.disabled = false;
            
            showToast('Tracking paused');
        }

        // Resume tracking
        function resumeTracking() {
            if (!tracking || !paused) return;
            
            paused = false;
            pauseBtn.disabled = false;
            resumeBtn.disabled = true;
            
            showToast('Tracking resumed');
        }

        // Clear current session
        function clearSession() {
            if (confirm('Are you sure you want to clear the current session?')) {
                sessionPoints = [];
                updateStats();
                showToast('Session cleared');
            }
        }

        // Update session time display
        function updateSessionTime() {
            if (sessionStartTime) {
                const now = new Date();
                const diff = Math.floor((now - sessionStartTime) / 1000);
                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;
                
                sessionTimeEl.textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        // Update statistics
        function updateStats() {
            totalDistanceEl.textContent = totalDistance.toFixed(2) + ' km';
            pointsRecordedEl.textContent = sessionPoints.length;
        }

        // Calculate distance between two points (Haversine formula)
        function calculateDistanceBetweenPoints(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Calculate total distance for a session
        function calculateDistance(points) {
            if (points.length < 2) return 0;
            
            let distance = 0;
            for (let i = 1; i < points.length; i++) {
                const prev = points[i-1];
                const curr = points[i];
                distance += calculateDistanceBetweenPoints(
                    prev.latitude, prev.longitude,
                    curr.latitude, curr.longitude
                );
            }
            return distance;
        }

        // Calculate total distance across all sessions
        function calculateTotalDistance() {
            return history.reduce((total, session) => total + session.distance, 0);
        }

        // Calculate duration between two dates
        function calculateDuration(start, end) {
            return Math.floor((end - start) / 1000);
        }

        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('gpsTrackerHistory', JSON.stringify(history));
            localStorage.setItem('gpsTrackerTotalDistance', totalDistance.toString());
        }

        // Load history from localStorage
        function loadHistory() {
            const savedHistory = localStorage.getItem('gpsTrackerHistory');
            const savedTotalDistance = localStorage.getItem('gpsTrackerTotalDistance');
            
            if (savedHistory) {
                try {
                    history = JSON.parse(savedHistory);
                } catch (error) {
                    console.error('Error loading history:', error);
                    history = [];
                }
            }
            
            if (savedTotalDistance) {
                totalDistance = parseFloat(savedTotalDistance) || 0;
            }
        }

        // Update history list display
        function updateHistoryList() {
            historyListEl.innerHTML = '';
            
            if (history.length === 0) {
                historyListEl.innerHTML = '<p>No sessions recorded yet.</p>';
                return;
            }
            
            // Sort by start time (newest first)
            const sortedHistory = [...history].sort((a, b) => 
                new Date(b.startTime) - new Date(a.startTime)
            );
            
            sortedHistory.forEach(session => {
                const sessionEl = document.createElement('div');
                sessionEl.className = 'history-item';
                sessionEl.innerHTML = `
                    <div>
                        <strong>Session ${session.id}</strong>
                        <p><strong>Start:</strong> ${new Date(session.startTime).toLocaleString()}</p>
                        <p><strong>End:</strong> ${new Date(session.endTime).toLocaleString()}</p>
                        <p><strong>Distance:</strong> ${session.distance.toFixed(2)} km</p>
                        <p><strong>Duration:</strong> ${formatDuration(session.duration)}</p>
                        <p><strong>Points:</strong> ${session.points.length}</p>
                    </div>
                `;
                historyListEl.appendChild(sessionEl);
            });
        }

        // Format duration for display
        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Show toast message
        function showToast(message) {
            toastEl.textContent = message;
            toastEl.style.display = 'block';
            
            setTimeout(() => {
                toastEl.style.display = 'none';
            }, 3000);
        }

        // Update online status display
        function updateOnlineStatus() {
            const status = navigator.onLine ? 'online' : 'offline';
            console.log('Network status:', status);
        }

        // Initialize the app when the page loads
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
