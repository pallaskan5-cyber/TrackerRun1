<!-- public/index.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Suivi GPS Temps Réel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://unpkg.com/mapbox-gl@2.9.2/dist/mapbox-gl.js"></script>
  <link href="https://unpkg.com/mapbox-gl@2.9.2/dist/mapbox-gl.css" rel="stylesheet" />
  <style>
    body { margin: 0; font-family: sans-serif; background-color: #1a202c; color: white; }
    #map { width: 100vw; height: 100vh; }
    .controls { position: absolute; top: 10px; left: 10px; z-index: 1000; padding: 10px; background: rgba(0,0,0,0.7); border-radius: 5px; }
    button { margin-right: 10px; }
    input[type=text], input[type=password] { margin-right: 10px; }
  </style>
</head>
<body>

<div id="root"></div>

<script type="module">
  import React from 'https://cdn.skypack.dev/react';
  import ReactDOM from 'https://cdn.skypack.dev/react-dom';

  function App() {
    const [isLoggedIn, setIsLoggedIn] = React.useState(false);
    const [userId, setUserId] = React.useState('');
    const [password, setPassword] = React.useState('');
    const [markers, setMarkers] = React.useState({});
    const mapRef = React.useRef(null);
    const socketRef = React.useRef(null);

    React.useEffect(() => {
      mapboxgl.accessToken = 'pk.eyJ1IjoiZXhhbXBsZSIsImEiOiJjbG9yNnh5dHQwMDAwM3FxdmFtY25xcmNpIn0.YourAccessTokenHere'; // Remplacer par votre clé Mapbox
      const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v11',
        center: [2.3522, 48.8566],
        zoom: 13
      });

      mapRef.current = map;

      socketRef.current = io();

      socketRef.current.on('connect', () => {
        console.log('Connecté au serveur');
        socketRef.current.emit('join-room', { userId: 'user1' });
      });

      socketRef.current.on('position-update', ({ userId, coords }) => {
        updateMarker(map, userId, coords);
      });

      navigator.geolocation.watchPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          const coords = { lat: latitude, lng: longitude };

          socketRef.current.emit('update-position', {
            userId: 'user1',
            coords
          });

          updateMarker(map, 'user1', coords);
        },
        err => alert("Erreur de géolocalisation"),
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );

      return () => {
        socketRef.current.close();
      };
    }, []);

    function updateMarker(map, id, coords) {
      let marker = markers[id];

      if (!marker) {
        const el = document.createElement('div');
        el.style.width = '20px';
        el.style.height = '20px';
        el.style.borderRadius = '50%';
        el.style.background = '#ff0000';
        marker = new mapboxgl.Marker(el).setLngLat([coords.lng, coords.lat]).addTo(map);
        setMarkers(prev => ({ ...prev, [id]: marker }));
      }

      marker.setLngLat([coords.lng, coords.lat]);
    }

    async function handleLogin(e) {
      e.preventDefault();
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: userId, password })
      });
      const data = await res.json();
      if (data.success) setIsLoggedIn(true);
    }

    return (
      <div className="relative w-full h-screen">
        {!isLoggedIn ? (
          <form onSubmit={handleLogin} className="absolute top-10 left-10 bg-black bg-opacity-70 p-4 rounded-md">
            <input type="text" placeholder="Nom d'utilisateur" value={userId} onChange={e => setUserId(e.target.value)} required />
            <input type="password" placeholder="Mot de passe" value={password} onChange={e => setPassword(e.target.value)} required />
            <button type="submit">Connexion</button>
          </form>
        ) : null}
        <div id="map"></div>
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
